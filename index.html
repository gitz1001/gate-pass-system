<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="e-gatepass System — Student exit verification and parent notification">
  <meta name="theme-color" content="#422467">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <title>e-gatepass</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/lib/jsQR.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app" id="app">

  <!-- ═══ SIDEBAR (Desktop) ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-wrap">
      <div class="logo-icon">S</div>
      <div class="logo-text">
        <div class="logo-name">e-gatepass</div>
        <div class="logo-sy">SY 2025–2026</div>
      </div>
    </div>

    <div class="nav" id="sidebar-nav">
      <!-- Nav items rendered by AppView -->
    </div>

    <div class="sidebar-foot">
      <div class="user-pill">
        <div class="user-avatar" id="user-avatar">SA</div>
        <div class="user-info">
          <div class="uname" id="user-name">System Admin</div>
          <div class="urole" id="user-role">Administrator</div>
        </div>
      </div>
      <button class="sidebar-action" id="btn-logout">
        <span id="logout-icon"></span> <span class="sidebar-footer-text">Sign out</span>
      </button>
      <button class="sidebar-action desktop-only" id="btn-collapse-sidebar">
        <span id="collapse-icon"></span> <span class="sidebar-footer-text">Collapse sidebar</span>
      </button>
    </div>
  </aside>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ═══ MAIN CONTENT ═══ -->
  <div class="main">
    <!-- Top Bar -->
    <div class="topbar" id="topbar">
      <button class="topbar-btn" id="btn-menu" title="Toggle sidebar">
        <span id="menu-icon"></span>
      </button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <div class="flex gap-8 items-center">
        <div id="topbar-actions">
          <button class="topbar-btn" id="btn-sync" title="Sync with Cloud" style="width:auto; padding:0 12px; font-size:11px; font-weight:600; display:flex; gap:6px;">
            <span class="badge b-pending" id="sync-dot" style="padding:4px; margin:0;"></span>
            <span id="sync-text" class="desktop-only">Connecting...</span>
          </button>
        </div>
        <button class="topbar-btn theme-toggle" id="btn-theme" title="Toggle theme">
          <span id="theme-icon"></span>
        </button>
      </div>
    </div>

    <!-- Page Content -->
    <div class="content" id="page-content">
      <!-- Rendered by AppView based on current page -->
    </div>
  </div>
</div>

<!-- ═══ BOTTOM NAV (Mobile) ═══ -->
<nav class="bottom-nav" id="bottom-nav">
  <div class="bottom-nav-inner" id="bottom-nav-inner">
    <!-- Rendered by AppView -->
  </div>
</nav>

<!-- ═══ MODAL CONTAINER ═══ -->
<div id="modal-root"></div>

<!-- ═══ TOAST CONTAINER ═══ -->
<div id="toast-root"></div>

<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered!', reg);
      }).catch(err => console.log('SW reg failed', err));
    });
  }
</script>
</body>
</html>
